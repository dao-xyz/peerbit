coverage:
  status:
    project:
      default:
        target: auto
        # Workspace-sharded uploads can drift the aggregate project percentage more than
        # the changed-line signal for small, well-tested fixes. We also intentionally
        # keep the heaviest performance-sensitive shared-log shard out of PR coverage,
        # which removes two uploads from the PR aggregate. Keep patch coverage strict
        # and allow that bounded project movement without blocking unrelated changes.
        threshold: 8%
        informational: false
    patch:
      default:
        target: auto
        threshold: 0%
        informational: false
