coverage:
  status:
    project:
      default:
        target: auto
        # Workspace-sharded uploads can drift the aggregate project percentage more than
        # the changed-line signal for small, well-tested fixes. We also intentionally
        # keep the heaviest performance-sensitive shared-log shard out of PR coverage,
        # which removes two uploads from the PR aggregate. Keep patch coverage strict
        # and allow that bounded project movement without blocking unrelated changes.
        threshold: 8%
        informational: false
    patch:
      default:
        # Patch coverage should gate changed production code, not the large shared-log
        # test-suite churn in performance/stability PRs. The heaviest shared-log shard
        # intentionally runs without coverage in PR CI, so counting changed test files
        # here creates persistent false negatives. Restrict the patch signal to source
        # files and require that signal to stay high.
        target: 90%
        threshold: 0%
        informational: false
        paths:
          - "packages/**/src"
