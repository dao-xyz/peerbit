coverage:
  status:
    project:
      default:
        target: auto
        # Workspace-sharded uploads can drift the aggregate project percentage more than
        # the changed-line signal for small, well-tested fixes. Keep patch coverage strict
        # and allow modest project movement without blocking unrelated changes.
        threshold: 2%
        informational: false
    patch:
      default:
        target: auto
        threshold: 0%
        informational: false
