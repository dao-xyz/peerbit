on:
  push:
    branches:
      - master
    paths:
      - packages/**
      - package.json
      - scripts/**
      - .changeset/**
      - .github/workflows/release.yml
  workflow_dispatch:
    inputs:
      publish_mode:
        description: Publish mode
        required: true
        default: stable
        type: choice
        options:
          - stable
          - rc
permissions:
  contents: write
  issues: write
  pull-requests: write

name: Release
jobs:
  # Stable release flow. On push to master, changesets/action opens/updates a
  # "Version Packages" PR that accumulates the pending .changeset/*.md files.
  # Merging that PR consumes the changesets, bumps versions + CHANGELOGs, and
  # this same job then builds, publishes the unpublished versions to npm, and
  # creates the git tags. A manual workflow_dispatch with publish_mode=stable
  # re-runs the build + from-package publish as an escape hatch.
  release:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode == 'stable') }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
      issues: write
      id-token: write
      pull-requests: write
    steps:
      - name: Verify Peerbit Bot release authentication
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RELEASE_PR_TOKEN is required for stable releases" >&2
            exit 1
          fi
          if ! authenticated_login=$(gh api user --jq .login); then
            echo "RELEASE_PR_TOKEN could not authenticate with GitHub" >&2
            exit 1
          fi
          if [ "$authenticated_login" != "peerbit-org" ]; then
            echo "RELEASE_PR_TOKEN must authenticate as peerbit-org (got: $authenticated_login)" >&2
            exit 1
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # The changesets action pushes via the git CLI, which uses the
          # credentials persisted here — so this must be the bot PAT (see the
          # RELEASE_PR_TOKEN note below) for the version-branch push to be able
          # to trigger CI on the Version Packages PR.
          token: ${{ secrets.RELEASE_PR_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      # The publish command builds, so the wasm toolchain must be installed before
      # the changesets action runs (several packages ship wasm-pack artifacts).
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile

      - name: Configure Peerbit Bot git identity
        run: |
          git config --local user.name "Peerbit Bot"
          git config --local user.email "273107789+peerbit-org@users.noreply.github.com"

      # changesets/action opens the Version Packages PR (when changesets are
      # pending) and, once that PR is merged, runs the publish command below.
      #
      # NOTE: the default workflow token cannot trigger downstream workflows (CI)
      # on the Version Packages PR it opens, so the PR uses RELEASE_PR_TOKEN —
      # a peerbit-org bot PAT with repo + workflow scopes. The authentication
      # preflight above deliberately fails closed if the secret is missing or does
      # not belong to peerbit-org. The checkout token (git pushes: version branch,
      # release tags), action token, and environment token below all use that PAT.
      #
      # createGithubReleases is disabled deliberately. changesets tags packages as
      # `<name>@<version>` (e.g. peerbit@5.2.21, @peerbit/crypto@3.2.0), whereas
      # release-please used `<component>-v<version>` (peerbit-v5.2.20). The new
      # namespace does not overlap the legacy one, so the first release run sees
      # every current package as "untagged" and establishes a fresh `@`-format tag
      # baseline. If GitHub Releases were left on, the action would parse those
      # baseline `New tag:` lines and create a GitHub Release per package built
      # from its release-please-formatted CHANGELOG (which has no `## <version>`
      # heading changesets can locate), producing release bodies that are the whole
      # changelog. Publishing correctness (npm from-package + git tags) is
      # unaffected; only the redundant GitHub Release objects are dropped. Re-enable
      # once the CHANGELOGs are migrated to the changesets `## <version>` format.
      - name: Create Release PR or Publish
        if: ${{ github.event_name == 'push' }}
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          github-token: ${{ secrets.RELEASE_PR_TOKEN }}
          # Keep the repository-local Peerbit Bot identity configured above.
          # Otherwise the action replaces it with github-actions[bot].
          setupGitUser: false
          version: pnpm run version-packages
          # Build, publish every unpublished version (from-package), then create
          # the pkg@version git tags and push them. The push is tags-only
          # (`git push origin --tags`, not `--follow-tags`): the version commit
          # always reaches master via the merged Version Packages PR, so pushing
          # the branch ref here is redundant — and it rejects non-fast-forward
          # if anything merges to master while the publish run is live, turning
          # a successful publish red.
          #
          # This MUST be a single `pnpm run <script>`. changesets/action runs the
          # publish command WITHOUT a shell, so an inline `a && b && c` chain here
          # is passed as literal arguments to the first command — only the build
          # runs, the actual publish + tagging are silently skipped, and the step
          # still exits 0. Keeping the chain inside the release:publish npm script
          # makes pnpm run it in a shell (exactly like version-packages above).
          publish: pnpm run release:publish
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: false
        env:
          # Older changesets/action builds read the token from the environment
          # rather than the github-token input; set both to stay robust.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Manual stable escape hatch: build, run the shared fail-closed security
      # gate, and publish anything whose package.json version is not yet on npm,
      # without going through the Version Packages PR.
      - name: Build, gate, and publish stable packages
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode == 'stable' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm run release

  # Release candidate flow: manual dispatch only, builds and runs
  # `aegir release-rc` to publish prerelease versions to npm.
  release-rc:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode == 'rc' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Verify Peerbit Bot release authentication
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RELEASE_PR_TOKEN is required for release candidates" >&2
            exit 1
          fi
          if ! authenticated_login=$(gh api user --jq .login); then
            echo "RELEASE_PR_TOKEN could not authenticate with GitHub" >&2
            exit 1
          fi
          if [ "$authenticated_login" != "peerbit-org" ]; then
            echo "RELEASE_PR_TOKEN must authenticate as peerbit-org (got: $authenticated_login)" >&2
            exit 1
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PR_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile

      - name: Configure Peerbit Bot git identity
        run: |
          git config --local user.name "Peerbit Bot"
          git config --local user.email "273107789+peerbit-org@users.noreply.github.com"

      - name: Build, gate, and publish RC to NPM
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
          NPM_CONFIG_GIT_CHECKS: "false"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm run release:rc
