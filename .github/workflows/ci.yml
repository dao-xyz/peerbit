# This is a Github Workflow that runs tests on any push or pull request.
# If the tests pass and this is a push to the master branch it also runs Semantic Release.
name: CI
on:
  push:
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    types: ["opened", "reopened", "synchronize"]
jobs:
  build_workspace:
    name: Build Workspace
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      PEERBIT_TEST_SESSION: mock
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false
      - name: Build
        run: |
          pnpm run build
      - name: Pack build outputs
        run: |
          find . \
            \( -path '*/node_modules' -o -path '*/.git' \) -prune -o \
            -type d -name dist -print0 | \
            tar --null -T - -czf workspace-dist.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: workspace-dist-${{ github.sha }}
          path: workspace-dist.tar.gz
          retention-days: 1

  test_push:
    if: github.event_name == 'push'
    name: Test (${{ matrix.test_cmd }}, Node v${{ matrix.node-version }}, OS ${{ matrix.os }})
    needs: build_workspace
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.test_cmd == 'pnpm run test:ci:part-7' && 45 || 30 }}
    env:
      PEERBIT_TEST_SESSION: mock
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-1
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-2a
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-2b
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-2c
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-3
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-4
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-5a
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-5b
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-6
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-7
            timeout_minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false
          # NOTE: CI runs node-only tests (`-t node`). Playwright system deps are not required
          # here and have proven flaky on GitHub runners due to transient apt repository errors.
      - name: Install Playwright browser
        if: matrix.test_cmd == 'pnpm run test:ci:part-2c'
        run: pnpm exec playwright install --only-shell chromium
      - uses: actions/download-artifact@v4
        with:
          name: workspace-dist-${{ github.sha }}
      - name: Restore build outputs
        run: |
          tar -xzf workspace-dist.tar.gz
      - name: Lint
        if: matrix.test_cmd == 'pnpm run test:ci:part-1'
        run: pnpm run lint
      - name: Tests
        env:
          PEERBIT_MOCHA_LOG_TEST_START: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || matrix.test_cmd == 'pnpm run test:ci:part-7') && '1' || '0' }}
          PEERBIT_MOCHA_LOG_QUIET: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || matrix.test_cmd == 'pnpm run test:ci:part-7') && '1' || '0' }}
          PEERBIT_MOCHA_LOG_INTERVAL_MS: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || matrix.test_cmd == 'pnpm run test:ci:part-7') && '10000' || '0' }}
        run: ${{matrix.test_cmd}}
      - name: Remap coverage reports to source paths
        if: always()
        run: node ./scripts/remap-coverage.mjs
      - name: Find coverage report files
        id: coverage_files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f -name 'coverage-remapped.json' -path '*/.coverage/*' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            mapfile -t files < <(find . -type f \( -name 'coverage-final.json' -o -name 'coverage-pw.json' \) -path '*/.coverage/*' | sort)
          fi
          echo "Found ${#files[@]} coverage files"
          if [ ${#files[@]} -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"
          echo "files=$(IFS=,; echo "${files[*]}")" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}"
      - name: Fail if no coverage files were produced
        if: |
          always() &&
          steps.coverage_files.outputs.count == '0' &&
          matrix.test_cmd != 'pnpm run test:ci:part-2b' &&
          matrix.test_cmd != 'pnpm run test:ci:part-2c' &&
          matrix.test_cmd != 'pnpm run test:ci:part-5b'
        run: |
          echo "No coverage files found under */.coverage/"
          exit 1
      - name: Upload coverage reports to Codecov
        if: always() && steps.coverage_files.outputs.count != '0' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          files: ${{ steps.coverage_files.outputs.files }}
          disable_search: true
          fail_ci_if_error: false
          verbose: true

  test_pr:
    if: github.event_name == 'pull_request'
    name: Test (${{ matrix.test_cmd }}, Node v${{ matrix.node-version }}, OS ${{ matrix.os }})
    needs: build_workspace
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    env:
      PEERBIT_TEST_SESSION: mock
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-1
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-2a
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-2b
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-2c
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-3
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-4
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-5a
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-5b
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-6
            timeout_minutes: 30
          - os: ubuntu-22.04
            node-version: 22.x
            test_cmd: pnpm run test:ci:part-7
            timeout_minutes: 45

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false
          # NOTE: CI runs node-only tests (`-t node`). Playwright system deps are not required
          # here and have proven flaky on GitHub runners due to transient apt repository errors.
      - name: Install Playwright browser
        if: matrix.test_cmd == 'pnpm run test:ci:part-2c'
        run: pnpm exec playwright install --only-shell chromium
      - uses: actions/download-artifact@v4
        with:
          name: workspace-dist-${{ github.sha }}
      - name: Restore build outputs
        run: |
          tar -xzf workspace-dist.tar.gz
      - name: Lint
        if: matrix.test_cmd == 'pnpm run test:ci:part-1'
        run: pnpm run lint
      - name: Tests
        env:
          PEERBIT_MOCHA_LOG_TEST_START: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || matrix.test_cmd == 'pnpm run test:ci:part-7') && '1' || '0' }}
          PEERBIT_MOCHA_LOG_QUIET: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || matrix.test_cmd == 'pnpm run test:ci:part-7') && '1' || '0' }}
          PEERBIT_MOCHA_LOG_INTERVAL_MS: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || matrix.test_cmd == 'pnpm run test:ci:part-7') && '10000' || '0' }}
        run: ${{matrix.test_cmd}}
      - name: Remap coverage reports to source paths
        if: always()
        run: node ./scripts/remap-coverage.mjs
      - name: Find coverage report files
        id: coverage_files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f -name 'coverage-remapped.json' -path '*/.coverage/*' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            mapfile -t files < <(find . -type f \( -name 'coverage-final.json' -o -name 'coverage-pw.json' \) -path '*/.coverage/*' | sort)
          fi
          echo "Found ${#files[@]} coverage files"
          if [ ${#files[@]} -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"
          echo "files=$(IFS=,; echo "${files[*]}")" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}"
      - name: Fail if no coverage files were produced
        if: |
          always() &&
          steps.coverage_files.outputs.count == '0' &&
          matrix.test_cmd != 'pnpm run test:ci:part-2b' &&
          matrix.test_cmd != 'pnpm run test:ci:part-2c' &&
          matrix.test_cmd != 'pnpm run test:ci:part-5b'
        run: |
          echo "No coverage files found under */.coverage/"
          exit 1
      - name: Upload coverage reports to Codecov
        if: always() && steps.coverage_files.outputs.count != '0' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          files: ${{ steps.coverage_files.outputs.files }}
          disable_search: true
          fail_ci_if_error: false
          verbose: true

  fanout_gate_pr:
    if: github.event_name == 'pull_request'
    name: Fanout Gate (PR)
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      PEERBIT_TEST_SESSION: mock
      NODE_OPTIONS: --no-warnings
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false
      - name: Build pubsub workspace
        run: |
          pnpm --filter @peerbit/pubsub... run build
      - name: Run fanout-tree-sim ci-small gate
        run: |
          pnpm -C packages/transport/pubsub run bench -- fanout-tree-sim \
            --preset ci-small --seed 1 \
            --assertMinJoinedPct 99 \
            --assertMinDeliveryPct 99 \
            --assertMaxOverheadFactor 1.15 \
            --assertMaxControlBpp 1.0 \
            --assertMaxTrackerBpp 0.7 \
            --assertMaxRepairBpp 0.15 \
            --assertAttachP95Ms 6000 \
            --assertMaxTreeLevelP95 5 \
            --assertMaxFormationScore 25
      - name: Run fanout-tree-sim ci-loss gate
        run: |
          # Match the structural smoke-test scenario in fanout-tree-sim.spec.ts.
          pnpm -C packages/transport/pubsub run bench -- fanout-tree-sim \
            --nodes 40 \
            --bootstraps 1 \
            --subscribers 30 \
            --relayFraction 0.35 \
            --messages 40 \
            --msgRate 50 \
            --msgSize 64 \
            --settleMs 5000 \
            --deadlineMs 500 \
            --timeoutMs 40000 \
            --seed 1 \
            --repair 1 \
            --rootUploadLimitBps 100000000 \
            --relayUploadLimitBps 100000000 \
            --rootMaxChildren 64 \
            --relayMaxChildren 32 \
            --neighborRepair 1 \
            --neighborRepairPeers 3 \
            --dropDataFrameRate 0.1 \
            --churnEveryMs 200 \
            --churnDownMs 100 \
            --churnFraction 0.05 \
            --assertMinJoinedPct 99 \
            --assertMinDeliveryPct 10 \
            --assertMinDeadlineDeliveryPct 10 \
            --assertMaxOverheadFactor 3.5 \
            --assertMaxTrackerBpp 5.3 \
            --assertMaxRepairBpp 5 \
            --assertMaxOrphans 10 \
            --assertMaxOrphanArea 30 \
            --assertRecoveryP95Ms 6000 \
            --assertMaxReparentsPerMin 500 \
            --assertAttachP95Ms 10000 \
            --assertMaxTreeLevelP95 8 \
            --assertMaxFormationScore 30

  shared_log_sync_batch_gate_pr:
    if: github.event_name == 'pull_request'
    name: Shared Log Sync Batch Gate (PR)
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      PEERBIT_TEST_SESSION: mock
      NODE_OPTIONS: --no-warnings
      SWEEP_BATCH_SIZES: "512,1024,16384"
      SWEEP_ENTRY_COUNT: "20000"
      SWEEP_WARMUP_RUNS: "0"
      SWEEP_RUNS: "1"
      SWEEP_TIMEOUT: "120000"
      SWEEP_ASSERT_MAX_RATIO: "8"
      SWEEP_ASSERT_REQUIRE_STARTSYNC_FOR_BATCH_GTE: "512"
      SWEEP_ASSERT_MAX_MEAN_MS: "512:90000,1024:90000,16384:90000"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false
      - name: Build shared-log workspace
        run: |
          pnpm --filter @peerbit/shared-log... run build
      - name: Run shared-log sync batch sweep gate
        run: |
          node ./packages/programs/data/shared-log/dist/benchmark/sync-batch-sweep.js
