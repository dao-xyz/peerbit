# This workflow runs the full test matrix for pull requests and pushes to master.
name: CI
on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    types: ["opened", "reopened", "synchronize"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  WASM_PACK_VERSION: 0.13.1
jobs:
  build_workspace:
    name: Build Workspace
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      PEERBIT_TEST_SESSION: mock
    steps:
      - uses: actions/checkout@v4
      - name: Restore cached workspace build
        id: workspace_dist_cache
        uses: actions/cache@v4
        with:
          path: workspace-dist.tar.gz
          key: ${{ runner.os }}-workspace-dist-${{ github.sha }}
      - uses: pnpm/action-setup@v4
        if: steps.workspace_dist_cache.outputs.cache-hit != 'true'
        with:
          run_install: false
      - uses: actions/setup-node@v4
        if: steps.workspace_dist_cache.outputs.cache-hit != 'true'
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Cache wasm-pack
        if: steps.workspace_dist_cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-${{ env.WASM_PACK_VERSION }}
      - name: Install deps
        if: steps.workspace_dist_cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/ci/install-wasm-pack.sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile=false
      - name: Validate retired domain references
        if: steps.workspace_dist_cache.outputs.cache-hit != 'true'
        run: |
          node --test scripts/validate-retired-domain-references.test.mjs
          node scripts/validate-retired-domain-references.mjs
      - name: Validate managed DNS lease edge function
        if: steps.workspace_dist_cache.outputs.cache-hit != 'true'
        run: |
          pnpm dlx deno@2.9.2 check \
            --frozen \
            --config apps/peerbit-org/supabase/functions/dns-lease/deno.json \
            apps/peerbit-org/supabase/functions/dns-lease/index.ts
          node --test \
            apps/peerbit-org/supabase/functions/_shared/dns-lease.test.ts \
            apps/peerbit-org/supabase/functions/_shared/cloudflare-dns.test.ts \
            apps/peerbit-org/supabase/functions/_shared/dns-lease-renewal.test.ts
          broker=apps/peerbit-org/cloudflare/dns-lease-broker
          pnpm --dir "$broker" install --frozen-lockfile --ignore-workspace
          pnpm --dir "$broker" run check
      - name: Seed retired server artifact regression fixture
        if: steps.workspace_dist_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p packages/clients/peerbit-server/node/dist/src
          for artifact in \
            aws.js aws.browser.js \
            aws.d.ts aws.browser.d.ts \
            aws.js.map aws.browser.js.map \
            aws.d.ts.map aws.browser.d.ts.map; do
            touch "packages/clients/peerbit-server/node/dist/src/$artifact"
          done
      - name: Build
        if: steps.workspace_dist_cache.outputs.cache-hit != 'true'
        run: |
          pnpm run build
      - name: Verify retired server artifacts cannot be packaged
        if: steps.workspace_dist_cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          server=packages/clients/peerbit-server/node
          if find "$server/dist/src" -maxdepth 1 -type f -name 'aws*' -print -quit | grep -q .; then
            echo "Retired AWS build artifacts survived @peerbit/server clean" >&2
            exit 1
          fi
          pack_dir="$(mktemp -d)"
          trap 'rm -rf "$pack_dir"' EXIT
          pnpm --dir "$server" pack --pack-destination "$pack_dir" >/dev/null
          if tar -tzf "$pack_dir"/*.tgz | grep -Eq 'package/(dist/src|src)/aws(\.browser)?\.'; then
            echo "Retired AWS implementation leaked into @peerbit/server package" >&2
            exit 1
          fi
      - name: Pack build outputs
        if: steps.workspace_dist_cache.outputs.cache-hit != 'true'
        run: |
          find . \
            \( -path '*/node_modules' -o -path '*/.git' \) -prune -o \
            -type d -name dist -print0 | \
            tar --null -T - -czf workspace-dist.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: workspace-dist-${{ github.sha }}
          path: workspace-dist.tar.gz
          retention-days: 1

  security_dependency_contracts:
    name: Security Dependency Contracts (Node v${{ matrix.node-version }})
    needs: build_workspace
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install exact dependency graph
        run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: workspace-dist-${{ github.sha }}
      - name: Restore workspace build outputs
        run: tar -xzf workspace-dist.tar.gz
      - name: Run fail-closed release security gate
        run: pnpm run release:security-gate

  test_push:
    if: github.event_name == 'push'
    name: Test (${{ matrix.test_cmd }}, Node v${{ matrix.node-version }}, OS ${{ matrix.os }})
    needs: build_workspace
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      PEERBIT_TEST_SESSION: mock
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        node-version: [22.x]
        test_cmd:
          - pnpm run test:ci:part-1
          - pnpm run test:ci:part-2a
          - pnpm run test:ci:part-2b
          - pnpm run test:ci:part-2c
          - pnpm run test:ci:part-3
          - pnpm run test:ci:part-4
          - pnpm run test:ci:part-5a
          - pnpm run test:ci:part-5b
          - pnpm run test:ci:part-6
          - pnpm run test:ci:part-7a
          - pnpm run test:ci:part-7b
          - pnpm run test:ci:part-7c
          - pnpm run test:ci:part-7d
          - pnpm run test:ci:part-7e
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-${{ env.WASM_PACK_VERSION }}
      - name: Install deps
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/ci/install-wasm-pack.sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile=false
          # Playwright system-dependency installation has proven flaky on GitHub runners
          # due to transient apt repository errors; install only the browser binary below.
      - name: Install Playwright browser
        if: matrix.test_cmd == 'pnpm run test:ci:part-1' || matrix.test_cmd == 'pnpm run test:ci:part-2c'
        run: pnpm exec playwright install --only-shell chromium
      - uses: actions/download-artifact@v4
        with:
          name: workspace-dist-${{ github.sha }}
      - name: Restore build outputs
        run: |
          tar -xzf workspace-dist.tar.gz
      - name: Lint
        if: matrix.test_cmd == 'pnpm run test:ci:part-1'
        run: pnpm run lint
      - name: Tests
        env:
          PEERBIT_MOCHA_LOG_TEST_START: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || startsWith(matrix.test_cmd, 'pnpm run test:ci:part-7')) && '1' || '0' }}
          PEERBIT_MOCHA_LOG_QUIET: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || startsWith(matrix.test_cmd, 'pnpm run test:ci:part-7')) && '1' || '0' }}
          PEERBIT_MOCHA_LOG_INTERVAL_MS: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || startsWith(matrix.test_cmd, 'pnpm run test:ci:part-7')) && '10000' || '0' }}
        run: ${{matrix.test_cmd}}
      - name: Upload React identity browser artifacts
        if: failure() && matrix.test_cmd == 'pnpm run test:ci:part-1'
        uses: actions/upload-artifact@v4
        with:
          name: react-identity-test-results-${{ github.job }}
          path: packages/clients/peerbit-react/e2e/browser/test-results
          if-no-files-found: ignore
          retention-days: 7
      - name: Remap coverage reports to source paths
        if: always()
        run: node ./scripts/remap-coverage.mjs
      - name: Find coverage report files
        id: coverage_files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f -name 'coverage-remapped.json' -path '*/.coverage/*' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            mapfile -t files < <(find . -type f \( -name 'coverage-final.json' -o -name 'coverage-pw.json' \) -path '*/.coverage/*' | sort)
          fi
          echo "Found ${#files[@]} coverage files"
          if [ ${#files[@]} -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"
          echo "files=$(IFS=,; echo "${files[*]}")" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}"
      - name: Fail if no coverage files were produced
        if: |
          always() &&
          steps.coverage_files.outputs.count == '0' &&
          matrix.test_cmd != 'pnpm run test:ci:part-2b' &&
          matrix.test_cmd != 'pnpm run test:ci:part-2c' &&
          matrix.test_cmd != 'pnpm run test:ci:part-5b' &&
          !startsWith(matrix.test_cmd, 'pnpm run test:ci:part-7')
        run: |
          echo "No coverage files found under */.coverage/"
          exit 1
      - name: Upload coverage artifact
        if: always() && steps.coverage_files.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ strategy.job-index }}
          path: "**/.coverage/**"
          include-hidden-files: true
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  coverage_push:
    if: ${{ always() && github.event_name == 'push' && !cancelled() }}
    name: Upload coverage
    needs: test_push
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage
      - name: Collect coverage files
        id: coverage_files
        shell: bash
        run: |
          mapfile -d '' files < <(find coverage -type f -path '*/.coverage/*' -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No downloaded coverage files found" >&2
            exit 1
          fi
          printf -v joined '%s,' "${files[@]}"
          echo "files=${joined%,}" >> "$GITHUB_OUTPUT"
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          use_oidc: true
          slug: ${{ github.repository }}
          files: ${{ steps.coverage_files.outputs.files }}
          disable_search: true
          fail_ci_if_error: false
          verbose: true

  test_pr:
    if: github.event_name == 'pull_request'
    name: Test (${{ matrix.test_cmd }}, Node v${{ matrix.node-version }}, OS ${{ matrix.os }})
    needs: build_workspace
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      PEERBIT_TEST_SESSION: mock
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        node-version: [22.x]
        test_cmd:
          - pnpm run test:ci:part-1
          - pnpm run test:ci:part-2a
          - pnpm run test:ci:part-2b
          - pnpm run test:ci:part-2c
          - pnpm run test:ci:part-3
          - pnpm run test:ci:part-4
          - pnpm run test:ci:part-5a
          - pnpm run test:ci:part-5b
          - pnpm run test:ci:part-6
          - pnpm run test:ci:part-7a
          - pnpm run test:ci:part-7b
          - pnpm run test:ci:part-7c
          - pnpm run test:ci:part-7d
          - pnpm run test:ci:part-7e

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-${{ env.WASM_PACK_VERSION }}
      - name: Install deps
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/ci/install-wasm-pack.sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile=false
          # Playwright system-dependency installation has proven flaky on GitHub runners
          # due to transient apt repository errors; install only the browser binary below.
      - name: Install Playwright browser
        if: matrix.test_cmd == 'pnpm run test:ci:part-1' || matrix.test_cmd == 'pnpm run test:ci:part-2c'
        run: pnpm exec playwright install --only-shell chromium
      - uses: actions/download-artifact@v4
        with:
          name: workspace-dist-${{ github.sha }}
      - name: Restore build outputs
        run: |
          tar -xzf workspace-dist.tar.gz
      - name: Lint
        if: matrix.test_cmd == 'pnpm run test:ci:part-1'
        run: pnpm run lint
      - name: Tests
        env:
          PEERBIT_MOCHA_LOG_TEST_START: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || startsWith(matrix.test_cmd, 'pnpm run test:ci:part-7')) && '1' || '0' }}
          PEERBIT_MOCHA_LOG_QUIET: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || startsWith(matrix.test_cmd, 'pnpm run test:ci:part-7')) && '1' || '0' }}
          PEERBIT_MOCHA_LOG_INTERVAL_MS: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6' || startsWith(matrix.test_cmd, 'pnpm run test:ci:part-7')) && '10000' || '0' }}
        run: ${{matrix.test_cmd}}
      - name: Upload React identity browser artifacts
        if: failure() && matrix.test_cmd == 'pnpm run test:ci:part-1'
        uses: actions/upload-artifact@v4
        with:
          name: react-identity-test-results-${{ github.job }}
          path: packages/clients/peerbit-react/e2e/browser/test-results
          if-no-files-found: ignore
          retention-days: 7
      - name: Remap coverage reports to source paths
        if: always()
        run: node ./scripts/remap-coverage.mjs
      - name: Find coverage report files
        id: coverage_files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f -name 'coverage-remapped.json' -path '*/.coverage/*' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            mapfile -t files < <(find . -type f \( -name 'coverage-final.json' -o -name 'coverage-pw.json' \) -path '*/.coverage/*' | sort)
          fi
          echo "Found ${#files[@]} coverage files"
          if [ ${#files[@]} -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"
          echo "files=$(IFS=,; echo "${files[*]}")" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}"
      - name: Fail if no coverage files were produced
        if: |
          always() &&
          steps.coverage_files.outputs.count == '0' &&
          matrix.test_cmd != 'pnpm run test:ci:part-2b' &&
          matrix.test_cmd != 'pnpm run test:ci:part-2c' &&
          matrix.test_cmd != 'pnpm run test:ci:part-5b' &&
          !startsWith(matrix.test_cmd, 'pnpm run test:ci:part-7')
        run: |
          echo "No coverage files found under */.coverage/"
          exit 1
  fanout_gate_pr:
    if: github.event_name == 'pull_request'
    name: Fanout Gate (PR)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      PEERBIT_TEST_SESSION: mock
      NODE_OPTIONS: --no-warnings
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-${{ env.WASM_PACK_VERSION }}
      - name: Install deps
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/ci/install-wasm-pack.sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile=false
      - name: Build pubsub workspace
        run: |
          pnpm --filter @peerbit/pubsub... run build
      - name: Run fanout-tree-sim ci-small gate
        run: |
          pnpm -C packages/transport/pubsub run bench -- fanout-tree-sim \
            --preset ci-small --seed 1 \
            --assertMinJoinedPct 99 \
            --assertMinDeliveryPct 99 \
            --assertMaxOverheadFactor 1.15 \
            --assertMaxControlBpp 1.0 \
            --assertMaxTrackerBpp 0.7 \
            --assertMaxRepairBpp 0.15 \
            --assertAttachP95Ms 6000 \
            --assertMaxTreeLevelP95 5 \
            --assertMaxFormationScore 25
      - name: Run fanout-tree-sim ci-loss gate
        run: |
          # Match the structural smoke-test scenario in fanout-tree-sim.spec.ts.
          pnpm -C packages/transport/pubsub run bench -- fanout-tree-sim \
            --nodes 40 \
            --bootstraps 1 \
            --subscribers 30 \
            --relayFraction 0.35 \
            --messages 40 \
            --msgRate 50 \
            --msgSize 64 \
            --settleMs 5000 \
            --deadlineMs 500 \
            --timeoutMs 40000 \
            --seed 1 \
            --repair 1 \
            --rootUploadLimitBps 100000000 \
            --relayUploadLimitBps 100000000 \
            --rootMaxChildren 64 \
            --relayMaxChildren 32 \
            --neighborRepair 1 \
            --neighborRepairPeers 3 \
            --dropDataFrameRate 0.1 \
            --churnEveryMs 200 \
            --churnDownMs 100 \
            --churnFraction 0.05 \
            --assertMinJoinedPct 99 \
            --assertMinDeliveryPct 10 \
            --assertMinDeadlineDeliveryPct 10 \
            --assertMaxOverheadFactor 3.5 \
            --assertMaxTrackerBytes 150000 \
            --assertMaxRepairBpp 5 \
            --assertMaxOrphans 10 \
            --assertMaxOrphanArea 30 \
            --assertRecoveryP95Ms 6000 \
            --assertMaxReparentsPerMin 500 \
            --assertAttachP95Ms 10000 \
            --assertMaxTreeLevelP95 8 \
            --assertMaxFormationScore 30
      - name: Run fanout parent-upgrade default-ready gate
        run: |
          pnpm -C packages/transport/pubsub run bench -- \
            fanout-tree-parent-upgrade-default-ready \
            --no-build \
            --seeds 1 \
            --idle-safety-seeds 1
      - name: Upload fanout gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanout-gate-pr-${{ github.run_id }}
          path: sim-results

  shared_log_sync_batch_gate_pr:
    if: github.event_name == 'pull_request'
    name: Shared Log Sync Batch Gate (PR)
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      PEERBIT_TEST_SESSION: mock
      NODE_OPTIONS: --no-warnings
      SWEEP_BATCH_SIZES: "512,1024,16384"
      SWEEP_ENTRY_COUNT: "20000"
      SWEEP_WARMUP_RUNS: "0"
      SWEEP_RUNS: "1"
      SWEEP_TIMEOUT: "120000"
      SWEEP_ASSERT_MAX_RATIO: "8"
      SWEEP_ASSERT_REQUIRE_STARTSYNC_FOR_BATCH_GTE: "512"
      SWEEP_ASSERT_MAX_MEAN_MS: "512:90000,1024:90000,16384:90000"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-${{ env.WASM_PACK_VERSION }}
      - name: Install deps
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/ci/install-wasm-pack.sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile=false
      - name: Build shared-log workspace
        run: |
          pnpm --filter @peerbit/shared-log... run build
      - name: Run shared-log sync batch sweep gate
        run: |
          node ./packages/programs/data/shared-log/dist/benchmark/sync-batch-sweep.js

  test_native:
    # The partition globs above only reach top-level package dirs, so the
    # native (wasm-bindgen) packages are tested here explicitly: cargo tests,
    # wasm builds and the TS glue suites, plus a packed-tarball smoke test
    # proving published artifacts ship working wasm.
    name: Native (cargo + wasm)
    needs: build_workspace
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      PEERBIT_TEST_SESSION: mock
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile=false
      - name: Install Playwright browser
        # For the browser legs below (aegir -t browser + the rust-core
        # stream smoke); --only-shell matches the e2e partitions above.
        run: pnpm exec playwright install --only-shell chromium
      - uses: actions/download-artifact@v4
        with:
          name: workspace-dist-${{ github.sha }}
      - name: Restore build outputs
        run: |
          tar -xzf workspace-dist.tar.gz
      - name: Cargo test indexer core crate
        # Pure Rust crate without a package.json, so it is invoked directly.
        run: cargo test --manifest-path packages/utils/indexer/core/Cargo.toml
      - name: Test @peerbit/any-store-rust
        run: pnpm --filter @peerbit/any-store-rust run test
      - name: Test @peerbit/native-backbone
        run: pnpm --filter @peerbit/native-backbone run test
      - name: Test @peerbit/log-rust
        # The package "test" script runs aegir without "-t node"; CI is
        # node-only (see the NOTE above), so the same steps are spelled out
        # here with the node target. Workspace deps come from the restored
        # build artifact.
        run: |
          cd packages/log/rust
          cargo test
          pnpm run build
          pnpm exec aegir test -t node
      - name: Test @peerbit/shared-log-rust
        run: |
          cd packages/programs/data/shared-log/rust
          cargo test
          pnpm run build
          pnpm exec aegir test -t node
          pnpm run test:e2e
      - name: Test @peerbit/document-rust
        run: pnpm --filter @peerbit/document-rust run test
      - name: Test @peerbit/network-rust
        run: pnpm --filter @peerbit/network-rust run test
      - name: Test @peerbit/stream suite in rust-core mode
        run: pnpm --filter @peerbit/network-rust run test:stream-rust-core
      - name: Test @peerbit/shared-log conformance in rust-core mode
        # Curated [default,native] conformance leg: re-runs an allowlist of the
        # EXISTING shared-log suites with the native (rust) data plane engaged
        # via PEERBIT_SHARED_LOG_RUST_CORE=1 (see test:shared-log-rust-core and
        # the switch in packages/clients/test-utils/src/session.ts). The
        # allowlist is anchored to describes confirmed byte-for-byte green on
        # native. Known backend-coupled cases remain explicitly excluded and
        # catalogued in test/NATIVE_CONFORMANCE.md; this curated parity gate is
        # blocking.
        run: pnpm --filter @peerbit/shared-log run test:shared-log-rust-core
      - name: Test @peerbit/document conformance in rust-core mode
        # Curated [default,native] conformance leg for the DOCUMENT layer: re-runs
        # an allowlist of the EXISTING document suites with the native (rust) data
        # plane engaged via PEERBIT_SHARED_LOG_RUST_CORE=1 (the same switch as the
        # shared-log leg above; see test:document-rust-core and the switch in
        # packages/clients/test-utils/src/session.ts). A store opened in the
        # DEFAULT mode:"auto" builds its generic index on @peerbit/indexer-rust,
        # so docs.index.index is a RustIndex on the switch peer (a hard in-suite
        # guard asserts this so the leg cannot false-green as JS). The allowlist
        # is anchored to describes confirmed byte-for-byte green on native.
        # Native-internal append-path assertions remain explicitly excluded and
        # catalogued in test/NATIVE_CONFORMANCE.md; this curated parity gate is
        # blocking.
        run: pnpm --filter @peerbit/document run test:document-rust-core
      - name: Test @peerbit/network-rust in the browser
        # Runs the browser-compatible subset (wire/topic-control/fanout codec
        # parity) under headless Chromium, proving the wasm module loads and
        # matches the TS implementations in a real browser. The session-based
        # specs stay node-only (TestSession needs TCP).
        run: pnpm --filter @peerbit/network-rust run test:browser
      - name: Browser rust-core stream smoke
        # Two browser peers with the native DirectStream core exchange data
        # through a TS-core node relay (webrtc via circuit relay); asserts
        # the native wire counters moved, i.e. frames were decoded and
        # signature-verified in wasm inside the browser.
        run: pnpm --filter stream-browser-test run test:rust-core
      - name: Packed tarball smoke test
        run: node ./scripts/native-pack-smoke.mjs
