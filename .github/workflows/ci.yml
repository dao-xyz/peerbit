# This is a Github Workflow that runs tests on any push or pull request.
# If the tests pass and this is a push to the master branch it also runs Semantic Release.
name: CI
on: 
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    types: ['opened', 'reopened', 'synchronize']
jobs:
  test_push:
    if: github.event_name == 'push'
    name: Test (${{ matrix.test_cmd }}, Node v${{ matrix.node-version }}, OS ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      PEERBIT_TEST_SESSION: mock
    strategy:
       matrix:
        os: [ ubuntu-22.04 ]
        node-version: [22.x]
        test_cmd: 
          - pnpm run test:ci:part-1
          - pnpm run test:ci:part-2
          - pnpm run test:ci:part-3
          - pnpm run test:ci:part-4
          - pnpm run test:ci:part-5
          - pnpm run test:ci:part-6
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false
          # NOTE: CI runs node-only tests (`-t node`). Playwright system deps are not required
          # here and have proven flaky on GitHub runners due to transient apt repository errors.
      - name: Build
        run: |
          pnpm run build
      - name: Lint
        if: matrix.test_cmd == 'pnpm run test:ci:part-1'
        run: pnpm run lint
      - name: Tests
        env:
          PEERBIT_MOCHA_LOG_TEST_START: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6') && '1' || '0' }}
          PEERBIT_MOCHA_LOG_QUIET: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6') && '1' || '0' }}
          PEERBIT_MOCHA_LOG_INTERVAL_MS: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6') && '10000' || '0' }}
        run: ${{matrix.test_cmd}}

  test_pr:
    if: github.event_name == 'pull_request'
    name: Test (${{ matrix.test_cmd }}, Node v${{ matrix.node-version }}, OS ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      PEERBIT_TEST_SESSION: mock
    strategy:
       matrix:
        os: [ ubuntu-22.04 ]
        node-version: [22.x]
        test_cmd: 
          - pnpm run test:ci:part-1
          - pnpm run test:ci:part-2
          - pnpm run test:ci:part-3
          - pnpm run test:ci:part-4
          - pnpm run test:ci:part-5
          - pnpm run test:ci:part-6

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false
          # NOTE: CI runs node-only tests (`-t node`). Playwright system deps are not required
          # here and have proven flaky on GitHub runners due to transient apt repository errors.
      - name: Build
        run: |
          pnpm run build
      - name: Lint
        if: matrix.test_cmd == 'pnpm run test:ci:part-1'
        run: pnpm run lint
      - name: Tests
        env:
          PEERBIT_MOCHA_LOG_TEST_START: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6') && '1' || '0' }}
          PEERBIT_MOCHA_LOG_QUIET: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6') && '1' || '0' }}
          PEERBIT_MOCHA_LOG_INTERVAL_MS: ${{ (matrix.test_cmd == 'pnpm run test:ci:part-4' || matrix.test_cmd == 'pnpm run test:ci:part-6') && '10000' || '0' }}
        run: ${{matrix.test_cmd}}

  fanout_gate_pr:
    if: github.event_name == 'pull_request'
    name: Fanout Gate (PR)
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      PEERBIT_TEST_SESSION: mock
      NODE_OPTIONS: --no-warnings
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false
      - name: Build pubsub workspace
        run: |
          pnpm --filter @peerbit/pubsub... run build
      - name: Run fanout-tree-sim ci-small gate
        run: |
          pnpm -C packages/transport/pubsub run bench -- fanout-tree-sim \
            --preset ci-small --seed 1 \
            --assertMinJoinedPct 99 \
            --assertMinDeliveryPct 99 \
            --assertMaxOverheadFactor 1.15 \
            --assertMaxControlBpp 1.0 \
            --assertMaxTrackerBpp 0.7 \
            --assertMaxRepairBpp 0.15 \
            --assertAttachP95Ms 6000 \
            --assertMaxTreeLevelP95 5 \
            --assertMaxFormationScore 25
      - name: Run fanout-tree-sim ci-loss gate
        run: |
          pnpm -C packages/transport/pubsub run bench -- fanout-tree-sim \
            --preset ci-loss --seed 1 \
            --assertMinJoinedPct 99 \
            --assertMinDeliveryPct 93 \
            --assertMaxOverheadFactor 2.5 \
            --assertMaxControlBpp 2.5 \
            --assertMaxTrackerBpp 1.8 \
            --assertMaxRepairBpp 0.9 \
            --assertMaxOrphans 3 \
            --assertMaxOrphanArea 10 \
            --assertRecoveryP95Ms 750 \
            --assertMaxReparentsPerMin 180

  shared_log_sync_batch_gate_pr:
    if: github.event_name == 'pull_request'
    name: Shared Log Sync Batch Gate (PR)
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      PEERBIT_TEST_SESSION: mock
      NODE_OPTIONS: --no-warnings
      SWEEP_BATCH_SIZES: "512,1024,16384"
      SWEEP_ENTRY_COUNT: "20000"
      SWEEP_WARMUP_RUNS: "0"
      SWEEP_RUNS: "1"
      SWEEP_TIMEOUT: "120000"
      SWEEP_ASSERT_MAX_RATIO: "8"
      SWEEP_ASSERT_REQUIRE_STARTSYNC_FOR_BATCH_GTE: "512"
      SWEEP_ASSERT_MAX_MEAN_MS: "512:90000,1024:90000,16384:90000"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false
      - name: Build shared-log workspace
        run: |
          pnpm --filter @peerbit/shared-log... run build
      - name: Run shared-log sync batch sweep gate
        run: |
          pnpm -C packages/programs/data/shared-log exec node --loader ts-node/esm ./benchmark/sync-batch-sweep.ts
