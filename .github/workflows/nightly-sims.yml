name: Nightly sims
on:
  schedule:
    # 03:30 UTC every day
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Job filter: comma-separated subset of pubsub_sims, fanout_parent_upgrade_soak, shared_log_chaos. Empty runs all jobs."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  pubsub_sims:
    name: PubSub sims
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == '' || contains(inputs.only, 'pubsub_sims') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      NODE_OPTIONS: --no-warnings
      PEERBIT_TEST_SESSION: mock
      WASM_PACK_VERSION: 0.13.1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-${{ env.WASM_PACK_VERSION }}

      - name: Install deps
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/ci/install-wasm-pack.sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile=false

      - name: Build pubsub workspace
        run: |
          pnpm --filter @peerbit/pubsub... run build

      - name: Build test-utils workspace
        run: |
          pnpm --filter @peerbit/test-utils... run build

      - name: Run DirectSub topic-sim (500 nodes)
        run: |
          set -euo pipefail
          mkdir -p sim-results
          # Full 400-subscriber gate, unblocked by the #983 fix (subscribe-
          # response batching + route-proxy coalescing): before it, route
          # resolution flooded the tree superlinearly and OOMed a 4GB heap.
          pnpm -C packages/transport/pubsub run bench -- topic-sim \
            --nodes 500 --degree 6 --subscribers 400 \
            --messages 50 --msgSize 256 --intervalMs 0 \
            --seed 1 --subscribeModel preseed --silent 1 \
            --settleMs 3000 --minDeliveredPct 99 \
            --timeoutMs 600000 > sim-results/topic-sim-500.txt
      - name: Run fanout-peerbit-sim (ci-small)
        run: |
          set -euo pipefail
          pnpm -C packages/clients/test-utils run bench -- fanout-peerbit-sim --preset ci-small --seed 1 > sim-results/fanout-peerbit-ci-small.txt
      - name: Run fanout-peerbit-sim (ci-loss)
        run: |
          # scale-1k (1000 full Peerbit clients in one process) still OOMs a
          # 4GB heap even after the #983 route-proxy storm fix — the residual
          # is footprint/state in other layers and needs its own memory
          # profile (tracked in #983) before it can gate here.
          set -euo pipefail
          pnpm -C packages/clients/test-utils run bench -- fanout-peerbit-sim --preset ci-loss --seed 1 > sim-results/fanout-peerbit-ci-loss.txt
      - name: Run fanout-tree-sim (scale-5k, trend evidence)
        run: |
          # Non-gating: a 5000-node single-process sim saturates one Node event
          # loop regardless of protocol quality (joins plateau ~40% identically
          # on 2-core CI and many-core workstations; the delivered/joined
          # asserts cannot pass at any tested scale on this harness - see
          # issue #966). Keep the run for trend artifacts; the two sims above
          # are the pass/fail gates for this job.
          mkdir -p sim-results
          pnpm -C packages/transport/pubsub run bench -- fanout-tree-sim --preset scale-5k --profile 1 --progress 1 --timeoutMs 1200000 2>&1 | tee sim-results/fanout-tree-scale-5k.txt || echo "fanout-tree-sim (trend leg) exited non-zero; see artifact"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-sims-${{ github.run_id }}
          path: sim-results

  fanout_parent_upgrade_soak:
    name: Fanout parent-upgrade soak (${{ matrix.name }})
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == '' || contains(inputs.only, 'fanout_parent_upgrade_soak') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: single-all
            artifact: fanout-parent-upgrade-single-all
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-eval
              --scenario all --seeds 1,2,3 --parentUpgradePreset default-candidate --strict 0
          - name: single-live-stream
            artifact: fanout-parent-upgrade-single-live-stream
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-eval
              --scenario ci-live-stream --seeds 1,2,3 --parentUpgradePreset default-candidate --strict 1
          - name: single-idle-large
            artifact: fanout-parent-upgrade-single-idle-large
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-eval
              --scenario ci-idle-upgrade-large --seeds 1,2,3 --parentUpgradePreset default-candidate
              --parentUpgradeRootMaxChildLoadRatio 0.25 --maxRootChildrenDelta 3 --maxCostRatio 1.2 --strict 0
          - name: single-idle-large-frontier
            artifact: fanout-parent-upgrade-single-idle-large-frontier
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-prepush
              --only frontier --outDir sim-results
          - name: multi-live
            artifact: fanout-parent-upgrade-multi-live
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-multi-eval
              --scenario ci-multi-live --seeds 1,2,3 --parentUpgradePreset default-candidate --strict 1
          - name: multi-live-churn
            artifact: fanout-parent-upgrade-multi-live-churn
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-multi-eval
              --scenario ci-multi-live-churn --seeds 1,2,3 --parentUpgradePreset default-candidate --strict 1
          - name: multi-video-live
            artifact: fanout-parent-upgrade-multi-video-live
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-multi-eval
              --scenario ci-multi-video-live --seeds 1,2,3 --parentUpgradePreset default-candidate --strict 1
          - name: multi-idle
            artifact: fanout-parent-upgrade-multi-idle
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-multi-eval
              --scenario ci-multi-idle --seeds 1,2,3 --parentUpgradePreset default-candidate --strict 1
          - name: multi-sparse-idle
            artifact: fanout-parent-upgrade-multi-sparse-idle
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-multi-eval
              --scenario ci-multi-sparse-idle --seeds 1,2,3 --parentUpgradePreset default-candidate --strict 1
          - name: multi-hotspot-idle
            artifact: fanout-parent-upgrade-multi-hotspot-idle
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-multi-eval
              --scenario ci-multi-hotspot-idle --seeds 1,2,3 --parentUpgradePreset default-candidate
              --maxUsefulIdleDeadlinePctDelta 2 --maxDataOverheadRatio 1.05 --strict 0
          - name: multi-scale-live
            artifact: fanout-parent-upgrade-multi-scale-live
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-multi-eval
              --scenario ci-multi-live --seeds 1 --parentUpgradePreset default-candidate --strict 1
              --nodes 80 --writers 8 --activeWriters 8 --subscribersPerTree 56
          - name: multi-scale-idle
            artifact: fanout-parent-upgrade-multi-scale-idle
            command: >-
              pnpm -C packages/transport/pubsub run bench -- fanout-tree-parent-upgrade-multi-eval
              --scenario ci-multi-idle --seeds 1 --parentUpgradePreset default-candidate --strict 0
              --nodes 80 --writers 8 --activeWriters 8 --subscribersPerTree 56
    env:
      NODE_OPTIONS: --no-warnings
      PEERBIT_TEST_SESSION: mock
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile=false

      - name: Build pubsub workspace
        run: |
          pnpm --filter @peerbit/pubsub... run build

      - name: Run parent-upgrade soak scenario
        run: |
          set -euo pipefail
          mkdir -p sim-results
          echo "${{ matrix.command }}"
          {
            ${{ matrix.command }}
          } 2>&1 | tee "sim-results/${{ matrix.artifact }}.txt"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.artifact }}-${{ github.run_id }}
          path: sim-results

  shared_log_chaos:
    name: SharedLog chaos
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == '' || contains(inputs.only, 'shared_log_chaos') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      NODE_OPTIONS: --no-warnings
      PEERBIT_TEST_SESSION: mock
      WASM_PACK_VERSION: 0.13.1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-${{ env.WASM_PACK_VERSION }}

      - name: Install deps
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/ci/install-wasm-pack.sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile=false

      - name: Build test-utils workspace
        run: |
          pnpm --filter @peerbit/test-utils... run build

      - name: Build shared-log workspace
        run: |
          pnpm --filter @peerbit/shared-log... run build

      - name: Run deterministic SharedLog chaos seeds
        run: |
          mkdir -p sim-results
          set -euo pipefail
          for seed in 7331 9331 11331 13331 15331 17331; do
            echo "Running shared-log chaos seed ${seed}"
            PEERBIT_SHARED_LOG_CHAOS_SEED=$seed pnpm run test:shared-log:chaos 2>&1 | tee "sim-results/shared-log-chaos-seed-${seed}.txt"
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-shared-log-chaos-${{ github.run_id }}
          path: sim-results
