name: Nightly sims
on:
  schedule:
    # 03:30 UTC every day
    - cron: '30 3 * * *'
  workflow_dispatch: {}

jobs:
  pubsub_sims:
    name: PubSub sims
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      NODE_OPTIONS: --no-warnings
      PEERBIT_TEST_SESSION: mock
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false

      - name: Build pubsub workspace
        run: |
          pnpm --filter @peerbit/pubsub... run build

      - name: Build test-utils workspace
        run: |
          pnpm --filter @peerbit/test-utils... run build

      - name: Run fanout-tree-sim (scale-5k)
        run: |
          set -euo pipefail
          mkdir -p sim-results
          pnpm -C packages/transport/pubsub run bench -- fanout-tree-sim --preset scale-5k --profile 1 --progress 1 --timeoutMs 1200000 2>&1 | tee sim-results/fanout-tree-scale-5k.txt

      - name: Run fanout-peerbit-sim (scale-1k)
        run: |
          set -euo pipefail
          pnpm -C packages/clients/test-utils run bench -- fanout-peerbit-sim --preset scale-1k --seed 1 > sim-results/fanout-peerbit-scale-1k.txt

      - name: Run DirectSub topic-sim (500 nodes)
        run: |
          set -euo pipefail
          pnpm -C packages/transport/pubsub run bench -- topic-sim \
            --nodes 500 --degree 6 --subscribers 400 \
            --messages 50 --msgSize 256 --intervalMs 0 \
            --seed 1 --subscribeModel preseed --silent 1 \
            --timeoutMs 600000 > sim-results/topic-sim-500.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-sims-${{ github.run_id }}
          path: sim-results


  shared_log_chaos:
    name: SharedLog chaos
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      NODE_OPTIONS: --no-warnings
      PEERBIT_TEST_SESSION: mock
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          pnpm install --frozen-lockfile=false

      - name: Build test-utils workspace
        run: |
          pnpm --filter @peerbit/test-utils... run build

      - name: Build shared-log workspace
        run: |
          pnpm --filter @peerbit/shared-log... run build

      - name: Run deterministic SharedLog chaos seeds
        run: |
          mkdir -p sim-results
          set -euo pipefail
          for seed in 7331 9331 11331 13331 15331 17331; do
            echo "Running shared-log chaos seed ${seed}"
            PEERBIT_SHARED_LOG_CHAOS_SEED=$seed pnpm run test:shared-log:chaos 2>&1 | tee "sim-results/shared-log-chaos-seed-${seed}.txt"
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-shared-log-chaos-${{ github.run_id }}
          path: sim-results
