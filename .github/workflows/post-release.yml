name: Post Release Automation

on:
  workflow_run:
    workflows:
      - Run Release Please
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  restore:
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.ENABLE_WORKSPACE_RESTORE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore workspace dependency protocol
        run: node tools/restore-workspace-deps.mjs

      - name: Create workspace restore pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: restore workspace dependency protocol"
          title: "chore: restore workspace dependency protocol"
          body: |
            ## Summary

            * reset internal workspace dependencies back to `workspace:*`
            * generated automatically after a successful release run

            ---

            _This PR was opened by the **Restore Workspace Dependencies** workflow._
          branch: chore/restore-workspace-deps
          labels: chore
          add-paths: |
            **/package.json
            tools/restore-workspace-deps.mjs
  bootstrap-rollout-pr:
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.ENABLE_BOOTSTRAP_ROLLOUT_PR == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout peerbit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect released server version change
        id: server
        run: |
          version=$(node -p "JSON.parse(require('node:fs').readFileSync('packages/clients/peerbit-server/node/package.json','utf8')).version")
          previous=$(git show HEAD^:packages/clients/peerbit-server/node/package.json 2>/dev/null | node -e "let data=''; process.stdin.setEncoding('utf8'); process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => { if (!data.trim()) process.exit(1); process.stdout.write(JSON.parse(data).version); });" || true)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"
          if [ -n "$previous" ] && [ "$previous" = "$version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Server version unchanged at $version; skipping bootstrap rollout PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected server release change: ${previous:-<none>} -> $version"
          fi

      - name: Resolve bootstrap PR auth
        if: ${{ steps.server.outputs.changed == 'true' }}
        id: auth
        env:
          BOOTSTRAP_PR_TOKEN: ${{ secrets.PEERBIT_BOOTSTRAP_PR_TOKEN }}
        run: |
          if [ -z "$BOOTSTRAP_PR_TOKEN" ]; then
            echo "PEERBIT_BOOTSTRAP_PR_TOKEN is required when @peerbit/server changes" >&2
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout peerbit-bootstrap
        if: ${{ steps.server.outputs.changed == 'true' && steps.auth.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: dao-xyz/peerbit-bootstrap
          token: ${{ secrets.PEERBIT_BOOTSTRAP_PR_TOKEN }}
          path: peerbit-bootstrap

      - name: Sync rollout target
        if: ${{ steps.server.outputs.changed == 'true' && steps.auth.outputs.enabled == 'true' }}
        run: |
          node tools/sync-bootstrap-rollout.mjs peerbit-bootstrap "${{ steps.server.outputs.version }}"

      - name: Create bootstrap rollout pull request
        if: ${{ steps.server.outputs.changed == 'true' && steps.auth.outputs.enabled == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PEERBIT_BOOTSTRAP_PR_TOKEN }}
          path: peerbit-bootstrap
          commit-message: "chore: roll bootstrap-5 to @peerbit/server@${{ steps.server.outputs.version }}"
          title: "chore: roll bootstrap-5 to @peerbit/server@${{ steps.server.outputs.version }}"
          body: |
            ## Summary

            * update `rollouts/bootstrap-5.json` to `@peerbit/server@${{ steps.server.outputs.version }}`
            * align the bootstrap ops dependency on `@peerbit/server`
            * generated automatically after a successful `peerbit` release

            Merging this PR triggers the bootstrap rollout workflow in `dao-xyz/peerbit-bootstrap`.

            ---

            _This PR was opened by the **Post Release Automation** workflow after [Run Release Please](${{ github.event.workflow_run.html_url }})._
          branch: chore/bootstrap-5-rollout-server-v${{ steps.server.outputs.version }}
          delete-branch: false
          add-paths: |
            rollouts/bootstrap-5.json
            package.json
