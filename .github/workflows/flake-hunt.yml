name: SharedLog flake hunt
on:
  workflow_dispatch:
    inputs:
      grep:
        description: Mocha grep for the tests to loop
        required: false
        default: "u32-simple replication degree update to smaller"
      iterations:
        description: Number of repetitions
        required: false
        default: "30"

jobs:
  hunt:
    name: Loop focused shared-log tests
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    env:
      NODE_OPTIONS: --no-warnings
      WASM_PACK_VERSION: 0.13.1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-${{ env.WASM_PACK_VERSION }}

      - name: Install deps
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/ci/install-wasm-pack.sh
          rustup target add wasm32-unknown-unknown
          pnpm install --frozen-lockfile=false

      - name: Build shared-log workspace
        run: |
          pnpm --filter @peerbit/shared-log... run build

      - name: Loop tests
        run: |
          set -uo pipefail
          mkdir -p hunt-results
          failures=0
          for i in $(seq 1 ${{ github.event.inputs.iterations }}); do
            echo "=== iteration $i ==="
            if PEERBIT_MOCHA_LOG_TEST_START=1 PEERBIT_MOCHA_LOG_INTERVAL_MS=10000 \
              node ./node_modules/aegir/src/index.js run test \
                --roots ./packages/programs/data/shared-log -- -t node --no-build \
                --grep "${{ github.event.inputs.grep }}" \
                > "hunt-results/iter-$i.log" 2>&1; then
              echo "iteration $i: PASS"
              rm "hunt-results/iter-$i.log"
            else
              echo "iteration $i: FAIL"
              failures=$((failures+1))
            fi
          done
          echo "total failures: $failures / ${{ github.event.inputs.iterations }}"
          echo "$failures" > hunt-results/failure-count.txt

      - name: Upload failing logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake-hunt-${{ github.run_id }}
          path: hunt-results
