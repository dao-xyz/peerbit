[package]
name = "peerbit_wire"
version = "0.0.0"
edition = "2021"
license = "MIT"
description = "Native wire codec and batched signature verification for the Peerbit direct-stream envelope"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
ed25519-dalek = { version = "2.1.1", default-features = false, features = ["batch", "fast"] }
js-sys = "0.3.80"
sha2 = "0.10.8"
wasm-bindgen = "0.2.103"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
