[package]
name = "peerbit_log_rust"
version = "0.0.0"
edition = "2021"
license = "MIT"
description = "Rust-backed log graph index for Peerbit"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
crypto-bench-candidates = ["dep:ed25519-compact"]

[dependencies]
ed25519-dalek = { version = "2.1.1", default-features = false, features = ["batch", "fast"] }
ed25519-compact = { version = "2.3.0", default-features = false, features = ["std"], optional = true }
indexmap = "2.7.1"
js-sys = "0.3.80"
bs58 = "0.5.1"
sha2 = "0.10.8"
wasm-bindgen = "0.2.103"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
