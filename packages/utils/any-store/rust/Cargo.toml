[package]
name = "peerbit_any_store_rust"
version = "0.0.0"
edition = "2021"
license = "MIT"
description = "Rust-backed AnyStore implementation for Peerbit"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
indexmap = "2.7.1"
js-sys = "0.3.80"
redb = "4.1.0"
wasm-bindgen = "0.2.103"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
