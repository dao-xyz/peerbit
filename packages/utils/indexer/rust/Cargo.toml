[package]
name = "peerbit_indexer_rust"
version = "0.0.0"
edition = "2021"
license = "MIT"
description = "Rust-backed index storage for Peerbit"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
indexmap = "2.7.1"
js-sys = "0.3.80"
roaring = "0.11.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
wasm-bindgen = "0.2.103"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
