server_names_hash_bucket_size 128;

server {
    server_name %DOMAIN%;
    listen [::]:4003 ssl ipv6only=on;
    listen 4003 ssl;

     # Load the certificate files.
    ssl_certificate         /etc/letsencrypt/live/%DOMAIN%/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/%DOMAIN%/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/%DOMAIN%/chain.pem;

    # Load the Diffie-Hellman parameter.
    ssl_dhparam /etc/letsencrypt/dhparams/dhparam.pem;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    server_name %DOMAIN%;
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl; 

     # Allow ACME challenge to resolve even if a client lands on https
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Each staged configuration writes an unpredictable file here. The CLI
    # requires the exact value over HTTPS before activating that generation.
    location ^~ /.well-known/peerbit-generation/ {
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
    

     # Load the certificate files.
    ssl_certificate         /etc/letsencrypt/live/%DOMAIN%/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/%DOMAIN%/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/%DOMAIN%/chain.pem;

    # Load the Diffie-Hellman parameter.
    ssl_dhparam /etc/letsencrypt/dhparams/dhparam.pem;
}
server {
    server_name %DOMAIN%;
    listen [::]:9002 ssl ipv6only=on;
    listen 9002 ssl;

     # Load the certificate files.
    ssl_certificate         /etc/letsencrypt/live/%DOMAIN%/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/%DOMAIN%/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/%DOMAIN%/chain.pem;

    # Load the Diffie-Hellman parameter.
    ssl_dhparam /etc/letsencrypt/dhparams/dhparam.pem;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80 ;
    server_name %DOMAIN%;

    # Anything requesting this particular URL should be served content from
    # Certbot's folder so the HTTP-01 ACME challenges can be completed for the
    # HTTPS certificates.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    # Managed DNS leases prove continued control through a short-lived local
    # challenge server. Keep the helper bound to loopback; only NGINX exposes
    # this exact path on public port 80.
    location ^~ /.well-known/peerbit-dns/ {
        proxy_pass http://127.0.0.1:8093;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
    }

    # Everything else: redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
